[SYSTEM]
NAME=ELMO TEST
SIMULATION_MODE=0
EXTERNAL_INTERFACE_ENABLED=0
EXTERNAL_INTERFACE_PORT=7420
TELEOPERATION_MODE=0
TELEOPERATION_CONSTANT_SCALING=0.3

;==========================================================================
; Real-time Tasks
; TASK_PERIOD : period in nanoseconds
; START_DELAY : delay execution of tasks in nanoseconds
; PRIORITY : 0 (lowest) - 99 (highest)
;==========================================================================
[RT_TASKS]
NO_OF_TASKS=7

[TASK0]
ENABLED=1
NAME=Main Control Task
PRIORITY=97
TASK_PERIOD=1000000
START_DELAY=0

[TASK1]
ENABLED=1
NAME=EtherCAT Control Task
PRIORITY=95
TASK_PERIOD=1000000
START_DELAY=0

[TASK2]
ENABLED=1
NAME=Keyboard Input Task
PRIORITY=50
TASK_PERIOD=0
START_DELAY=0

[TASK3]
ENABLED=1
NAME=Terminal Printer
PRIORITY=49
TASK_PERIOD=1000000000
START_DELAY=0

[TASK4]
ENABLED=1
NAME=Logger Task
PRIORITY=48
TASK_PERIOD=5000000
START_DELAY=0

[TASK5]
ENABLED=1
NAME=IMU Task
PRIORITY=90
TASK_PERIOD=1000000
START_DELAY=0

[TASK6]
ENABLED=1
NAME=Learning Task
PRIORITY=51
TASK_PERIOD=5000000
START_DELAY=0



;==========================================================================
; DC_ENABLED : Number of Slaves
; DC_ENABLED : Enable distributed clock
