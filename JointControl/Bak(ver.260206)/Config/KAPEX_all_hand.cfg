NAME=Logger Task
PRIORITY=45 #45
TASK_PERIOD=1000000
START_DELAY=0

[TASK5]
ENABLED=0
NAME=IMU Task
PRIORITY=90
TASK_PERIOD=1000000
START_DELAY=0

[TASK6]
ENABLED=0
NAME=Learning Task
PRIORITY=80
TASK_PERIOD=20000000
START_DELAY=0

[TASK7]
ENABLED=0
NAME=Gamepad Control Task
PRIORITY=60
TASK_PERIOD=5000000
START_DELAY=0

;==========================================================================
; DC_ENABLED : Number of Slaves
; DC_ENABLED : Enable distributed clock
